<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Homara logo</title>
  <desc id="desc">Blue ticket-shaped logo with HOMARA text in orange.</desc>
  <defs>
    <mask id="ticket-shape">
      <rect x="0" y="0" width="1200" height="420" rx="80" ry="80" fill="white"/>
      <circle cx="0" cy="105" r="26" fill="black"/>
      <circle cx="0" cy="158" r="26" fill="black"/>
      <circle cx="0" cy="210" r="26" fill="black"/>
      <circle cx="0" cy="263" r="26" fill="black"/>
      <circle cx="0" cy="315" r="26" fill="black"/>
      <circle cx="1200" cy="105" r="26" fill="black"/>
      <circle cx="1200" cy="158" r="26" fill="black"/>
      <circle cx="1200" cy="210" r="26" fill="black"/>
      <circle cx="1200" cy="263" r="26" fill="black"/>
      <circle cx="1200" cy="315" r="26" fill="black"/>
    </mask>
  </defs>

  <rect x="0" y="0" width="1200" height="420" fill="#264991" mask="url(#ticket-shape)"/>
  <text
    x="600"
    y="250"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="160"
    font-weight="700"
    letter-spacing="4"
    fill="#F6A623"
  >
    HOMARA
  </text>
</svg>
