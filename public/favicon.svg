<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Homara favicon</title>
  <desc id="desc">Orange square background with blue ticket shape and Homara text.</desc>

  <defs>
    <mask id="ticket">
      <rect x="48" y="140" width="416" height="232" rx="34" ry="34" fill="white"/>
      <circle cx="48" cy="178" r="12" fill="black"/>
      <circle cx="48" cy="205" r="12" fill="black"/>
      <circle cx="48" cy="232" r="12" fill="black"/>
      <circle cx="48" cy="259" r="12" fill="black"/>
      <circle cx="48" cy="286" r="12" fill="black"/>
      <circle cx="48" cy="313" r="12" fill="black"/>
      <circle cx="464" cy="178" r="12" fill="black"/>
      <circle cx="464" cy="205" r="12" fill="black"/>
      <circle cx="464" cy="232" r="12" fill="black"/>
      <circle cx="464" cy="259" r="12" fill="black"/>
      <circle cx="464" cy="286" r="12" fill="black"/>
      <circle cx="464" cy="313" r="12" fill="black"/>
    </mask>
  </defs>

  <rect x="0" y="0" width="512" height="512" fill="#F6A623"/>
  <rect x="48" y="140" width="416" height="232" fill="#264991" mask="url(#ticket)"/>

  <text
    x="256"
